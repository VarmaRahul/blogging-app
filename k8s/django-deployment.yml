apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
  namespace: blog
  labels:
    app: live-django
spec:
  replicas: 1
  selector:
    matchLabels:
      app: live-django
  template:
    metadata:
      labels:
        app: live-django
    spec:
      initContainers:
      - name: migrate
        image: xedose/blogging-app:latest
        command: ["python", "manage.py", "migrate"]
        envFrom:
          - configMapRef:
              name: app-config
          - secretRef:
              name: app-secret
      
      # main container
      containers:
      - name: django
        image: xedose/blogging-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000

        # volume mount
        - name: media-data
          mountPath: /usr/src/app/media

        # env from ConfigMap 
        envFrom:
        - configMapRef:
            name: app-config
        # env from Secret
        - secretRef:
            name: app-secret

        # resource limits
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "400m"
            memory: "512Mi"

        # startup probe
        startupProbe:
          httpGet:
            path: /
            port: 8000
          failureThreshold: 20
          periodSeconds: 5

        # liveness probe
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 20

        # readiness probe
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10

      # volumes
      volumes:
      - name: media-data
        persistentVolumeClaim:
          claimName: media-pvc
      
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 0
          maxSurge: 1
