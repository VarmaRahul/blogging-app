name: Build and Deploy Docker Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.4.0

      - name: Login to DockerHub
        uses: docker/login-action@v3.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker buildx build --platform linux/amd64 --push -f Docker-alpine -t xedose/blogging-image:latest .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: ssh deploy
        #if: steps.get-container.outputs.stdout != ''
        uses: easingthemes/ssh-deploy@v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: "ubuntu"

          SCRIPT_AFTER: |
            CONTAINER_NAME=$(docker ps --filter "ancestor=xedose/blogging-image:latest" --format "{{.Names}}")
            echo "Running container: $CONTAINER_NAME"
            docker pull xedose/blogging-image:latest
            if [ -n "$CONTAINER_NAME" ]; then
              docker stop $CONTAINER_NAME
              docker rm $CONTAINER_NAME
            fi
            docker run -d --name django-blog -p 8000:8000 xedose/blogging-image:latest
            #cd blogging-app
            docker compose up -d