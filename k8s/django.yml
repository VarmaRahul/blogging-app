apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: blog
data:
  DEBUG: "True"
  ALLOWED_HOSTS: '*' 
  USE_POSTGRES: "True"
  DB_HOST: "db"
  DB_NAME: "postgres"
  DB_USER: "postgres"
  DB_PORT: "5432"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: blog
type: Opaque
data:
  SECRET_KEY: ZGphbmdvLWluc2VjdXJlLUA2a3oqa14rdmNxZXd2MTA4c3pqMUA9MTgwbT1yajIteDhmeDVzZSt6YXQ0LXVxY25A # base64 encoded
  DB_PASSWORD: UG9zdGdyZXNAMTIz #Postgres@123

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: blog

spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
  namespace: blog
  labels:
    app: live-django
spec:
  replicas: 1
  strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 0
          maxSurge: 1
  selector:
    matchLabels:
      app: live-django
  template:
    metadata:
      labels:
        app: live-django
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:15
        command:
          - sh
          - -c
          - |
            echo "Waiting for postgres..."
            until pg_isready -h db -p 5432; do
              sleep 2
            done
            echo "Postgres is ready"

      - name: migrate
        image: xedose/blogging-app:latest
        command:
          - python
          - manage.py
          - migrate
        envFrom:
          - configMapRef:
              name: app-config
          - secretRef:
              name: app-secret
      
      # main container
      containers:
      - name: django
        image: xedose/blogging-app:latest
        imagePullPolicy: Always
        command:
        - gunicorn
        - myproject.wsgi:application
        - --bind
        - 0.0.0.0:8000
        ports:
        - containerPort: 8000

        # volume mount
        volumeMounts:
        - name: media-data
          mountPath: /usr/src/app/media

        # env from ConfigMap 
        envFrom:
        - configMapRef:
            name: app-config
        # env from Secret
        - secretRef:
            name: app-secret

        # resource limits
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "400m"
            memory: "512Mi"

        # startup probe
        startupProbe:
          httpGet:
            path: /
            port: 8000
          failureThreshold: 20
          periodSeconds: 5

        # liveness probe
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 20

        # readiness probe
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10

      # volumes
      volumes:
      - name: media-data
        persistentVolumeClaim:
          claimName: media-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: blog

spec:
  type: NodePort
  selector:
    app: live-django
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30000
