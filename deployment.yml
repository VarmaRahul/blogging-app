kind: Namespace
apiVersion: v1
metadata:
  name: django
---

kind: Deployment
apiVersion: apps/v1
metadata:
  name: django-deployment
  namespace: django
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      restartPolicy: Always
      containers:
      - name: django-container
        image: xedose/blogging-image
        ports:
        - containerPort: 8000
---

kind: Service
apiVersion: v1
metadata:
  name: django-service
  namespace: django
spec:
  selector:
    app: django
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8000
  type: ClusterIP
