kind: Deployment
apiVersion: apps/v1
metadata:
  name: django-deployment
  namespace: django
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      restartPolicy: Always
      containers:
      - name: django-container
        image: xedose/blogging-image
        ports:
        - containerPort: 8000
