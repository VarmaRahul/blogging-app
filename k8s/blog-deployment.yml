apiVersion: v1
kind: Namespace
metadata:
  name: blog

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: blog
data:
  DEBUG: "True"
  ALLOWED_HOSTS: '*' 
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: blog
type: Opaque
data:
  SECRET_KEY: ZGphbmdvLWluc2VjdXJlLUA2a3oqa14rdmNxZXd2MTA4c3pqMUA9MTgwbT1yajIteDhmeDVzZSt6YXQ0LXVxY25A # base64 encoded

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: django-pvc
  namespace: blog
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: blog

spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi

--- 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
  namespace: blog
  labels:
    app: live-django
spec:
  replicas: 1
  selector:
    matchLabels:
      app: live-django
  template:
    metadata:
      labels:
        app: live-django
    spec:
      # main container
      containers:
      - name: django
        image: xedose/blogging-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000

        # volume mount
        volumeMounts:
        - name: sqlite-data
          mountPath: /db
        - name: media-data
          mountPath: /media

        # env from ConfigMap 
        envFrom:
        - configMapRef:
            name: app-config
        # env from Secret
        - secretRef:
            name: app-secret

        # resource limits
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "400m"
            memory: "512Mi"

        # startup probe
        startupProbe:
          httpGet:
            path: /
            port: 8000
          failureThreshold: 30
          periodSeconds: 2

        # liveness probe
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10

        # readiness probe
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

      # volumes
      volumes:
      - name: sqlite-data
        persistentVolumeClaim:
          claimName: django-pvc
      - name: media-data
        persistentVolumeClaim:
          claimName: media-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: blog

spec:
  type: NodePort
  selector:
    app: live-django
  ports:
  - port: 8000
    targetPort: 8000
    NodePort: 30000