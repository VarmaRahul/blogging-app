name: CI - Build & Push

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008

  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2

  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  dependency-scan:
    name: Dependency & License Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit pip-licenses
      - run: pip-audit
      - run: pip-licenses

  build-scan-push:
    name: Build, Scan & Push
    needs: [lint, dockerfile-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🔥 NEW (add this)
      - uses: docker/setup-buildx-action@v3

      # 🔥 REPLACES docker build + push
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: xedose/blogging-app:v1.0.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        
      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          image-ref: xedose/blogging-app:v1.0.${{ github.run_number }}
          format: table
          severity: CRITICAL,HIGH
      - name: Push Image
        run: docker push xedose/blogging-app:v1.0.${{ github.run_number }}