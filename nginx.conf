# nginx.conf
# NGINX configuration to serve Django app and handle SSL termination
upstream django {
    server django-blog:8000;
}

server {
    listen 80;
    server_name webdevman.me;

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}

server {
    listen 443 ssl;
    server_name webdevman.me;

    ssl_certificate /etc/letsencrypt/live/webdevman.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webdevman.me/privkey.pem;

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}
