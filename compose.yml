# dockercompose file
services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ubuntu/blogging-app/nginx.conf:/etc/nginx/sites-available/default  # Mount Nginx config file
      - /etc/letsencrypt/live/webdevman.me:/etc/letsencrypt/live/webdevman.me  # Mount SSL certificates