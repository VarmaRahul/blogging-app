{% extends 'layout.html' %}

{% block title %}
    Calculator
{% endblock %}

{% block content %}
    <section>
        <div class="col-12">
            <form method="post">
                {% csrf_token %}
                <div>
                    <label for="num1">Value 1</label>
                    <input type="text" name='num1' value="{{num1}}">
                </div>
                <div>
                    <label for="opr">Select Operator</label>
                    <select name='opr'>
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="*">*</option>
                        <option value="/">/</option>
                    </select>
                </div>
                <div>
                    <label for="num2">Value 2</label>
                    <input type="text" name='num2' value="{{num2}}">
                </div>
                <div>
                    <button type="submit">Calculate</button>
                </div>
                <div>
                    <label>Output</label>
                    <input type="text" value="{{output}}" placeholder="Result">
                </div>
                <div>
                    <button type="button">
                        <a href="/game" style="text-decoration:none;">Reset</a>
                    </button>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
