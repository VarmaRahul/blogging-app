name: Build and Deploy Docker Image

on:
  workflow_dispatch
  #push:
  #  branches: [ "main" ]
  #pull_request:
  #  branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker buildx build --platform linux/amd64 --push -f Docker-alpine -t xedose/blogging-image:latest .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to remote server
        if: steps.get-container.outputs.stdout != ''
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            CONTAINER_NAME=$(docker ps --filter "ancestor=xedose/blogging-image:latest" --format "{{.Names}}")
            echo "Running container: $CONTAINER_NAME"
            docker pull xedose/blogging-image:latest
            if [ -n "$CONTAINER_NAME" ]; then
              docker stop $CONTAINER_NAME
              docker rm $CONTAINER_NAME
            fi
            docker run -d --name django-blog -p 80:8000 xedose/blogging-image:latest
